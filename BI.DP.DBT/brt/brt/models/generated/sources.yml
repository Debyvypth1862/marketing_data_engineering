version: 2
sources:
- name: BRT
  quoting:
    database: true
    schema: false
    identifier: false
  tables:
  - name: _AIRBYTE_RAW_ADVERTISER_OPERATOR
    external:
      location: "@STG.BRT.S3_ESTG_BRT_JSON_FF"
      pattern: "(?=.*/advertiser_operator/)^.*"
      file_format: "STG.BRT.JSON_FF"
      auto_refresh: false
      refresh_on_create: false
      partitions:
        - name: _AIRBYTE_EMITTED_AT
          data_type: TIMESTAMP_TZ(9)
          expression: CAST(SPLIT_PART(SPLIT_PART(METADATA$FILENAME, '/', -1), '_', 1) AS TIMESTAMP_TZ(9))
    columns:
      - name: _AIRBYTE_AB_ID
        data_type: VARCHAR(16777216)
        expression: "CAST(GET($1, '_airbyte_ab_id') AS VARCHAR(16777216))"
      - name: _AIRBYTE_DATA
        data_type: VARCHAR(16777216)
        expression: "GET($1, '_airbyte_data')"
      # - name: _AIRBYTE_EMITTED_AT
      #   data_type: TIMESTAMP_TZ(9)
      #   expression: "CAST(SPLIT_PART(SPLIT_PART(METADATA$FILENAME, '/', -1), '_', 1) AS TIMESTAMP_TZ(9))"
      - name: FILE_NAME
        data_type: VARCHAR(16777216)
        expression: "METADATA$FILENAME"
      - name: FILE_ROW_NUMBER
        data_type: NUMBER(38,0)
        expression: "METADATA$FILE_ROW_NUMBER"
      - name: PLATFORM_NAME
        data_type: VARCHAR(16777216)
        expression: "SPLIT_PART(METADATA$FILENAME, '/', 3)"
      - name: OPERATOR_NAME
        data_type: VARCHAR(16777216)
        expression: "SPLIT_PART(METADATA$FILENAME, '/', 4)"
      - name: ACCOUNT_NAME
        data_type: VARCHAR(16777216)
        expression: "SPLIT_PART(METADATA$FILENAME, '/', 5)"
      - name: S3_PATH
        data_type: VARCHAR(16777216)
        expression: "SPLIT_PART(METADATA$FILENAME, 'raw_data/', -1)"
