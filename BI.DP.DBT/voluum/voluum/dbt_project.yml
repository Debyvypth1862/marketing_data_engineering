    CAMPAIGN_REPORT: voluum._AIRBYTE_RAW_CAMPAIGN_REPORT
    AFFILIATE_NETWORK_REPORT_AB1: voluum._AIRBYTE_RAW_AFFILIATE_NETWORK_REPORT
    AFFILIATE_NETWORK_REPORT_AB2: voluum._AIRBYTE_RAW_AFFILIATE_NETWORK_REPORT
