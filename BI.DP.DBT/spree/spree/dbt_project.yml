name: spree_dbt
version: '1.0'
config-version: 2
profile: SPREE
flags:
  partial_parse: true
  printer_width: 120
  send_anonymous_usage_stats: false
  use_colors: true
model-paths:
- models
snapshot-paths:
- snapshots
docs-paths:
- docs
analysis-paths:
- analysis
test-paths:
- tests
seed-paths:
- data
macro-paths:
- macros
target-path: ../build
log-path: ../logs
packages-install-path: ../dbt
clean-targets:
- build
- dbt_modules
quoting:
  database: true
  schema: false
  identifier: true
dispatch:
- macro_namespace: dbt_utils
  search_order:
  - airbyte_utils
  - dbt_utils