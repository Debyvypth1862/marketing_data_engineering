      - name: GEONAME_ID
        data_type: FLOAT
        expression: value:c2::FLOAT
      - name: REGISTERED_COUNTRY_GEONAME_ID
        data_type: FLOAT
        expression: value:c3::FLOAT
      - name: REPRESENTED_COUNTRY_GEONAME_ID
        data_type: FLOAT
