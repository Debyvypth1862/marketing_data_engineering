version: "0.29.0"

definitions:
  selector:
    type: RecordSelector
    extractor:
      type: CustomRecordExtractor
      class_name: sourcecustomcomponents.CustomRecordExtractor.CustomRecordExtractor_for_softswiss
      field_path: [ ]
  datetime_cursor:
    class_name: sourcecustomcomponents.CustomDateTimeBasedCursor.CustomDateTimeBasedCursor_for_softswiss
    start_datetime:
      datetime: "{{ config['start_date'] }}"
      datetime_format: "%Y-%m-%d"
    end_datetime:
      datetime: "{{ now_utc() }}"
      datetime_format: "%Y-%m-%d %H:%M:%S.%f+00:00"
    step: "P{{ config['step'] }}D"
    datetime_format: "%Y-%m-%d"
    cursor_granularity: "P1D"
    cursor_field: "date"
    loopback_window: "P{{ config['loopback_days'] or '10' }}D"
  requester:
    type: CustomRequester
    class_name: sourcecustomcomponents.CustomRequester.CustomRequester_for_softswiss
    url_base: "abc.com"  
  retriever:
    type: SimpleRetriever
    record_selector:
      $ref: "#/definitions/selector"
    paginator:
      type: NoPagination
    requester:
      $ref: "#/definitions/requester"
      # error_handler:
      #   response_filters:
      #     - http_codes: [ 404 ]
      #       action: IGNORE
      #     - http_codes: [ 429 ]
      #       action: RETRY
      #     - http_codes: [ 401]
      #       action: FAIL
            
      #   backoff_strategies:
      #   - type: "ConstantBackoffStrategy"
      #     backoff_time_in_seconds: 30
  base_stream:
    type: DeclarativeStream
    retriever:
      $ref: "#/definitions/retriever"
    incremental_sync:
      type: CustomIncrementalSync
      class_name: sourcecustomcomponents.CustomDateTimeBasedCursor.CustomDateTimeBasedCursor_for_softswiss
      start_datetime:
        datetime: "{{ config['start_date'] }}"
        datetime_format: "%Y-%m-%d"
      end_datetime:
        datetime: "{{ now_utc() }}"
        datetime_format: "%Y-%m-%d %H:%M:%S.%f+00:00"
      step: "P1D"
      datetime_format: "%Y-%m-%d"
      cursor_granularity: "P1D"
      cursor_field: "date"
      recovery_dates: "{{ config['recovery_dates'] }}"
  activity_report_stream:
    $ref: "#/definitions/base_stream"
    name: "activity_report"
    transformations:
      - type: AddFields
        fields:
          - path: [ "date" ]
            value: "{{ stream_slice[ 'start_time' ] }}"
          - path: [ "start_date" ]
            value: "{{ stream_slice[ 'start_time' ] }}"
          - path: [ "end_date" ]
            value: "{{ stream_slice[ 'end_time' ] }}"
          - path: [ "tracker_login_id" ]
            value: "{{ config[ 'tracker_login_id' ] }}"

    $parameters:
      path: "/api/customer/v1/partner/report?from={{ stream_slice['start_time'] }}&to={{ stream_slice['end_time'] }}&&exchange_rates_date={{ config['exchange_rates_date'] }}&columns[]=ngr&columns[]=deposits_sum&columns[]=deposits_count&columns[]=first_deposits_count&columns[]=first_deposits_sum&columns[]=visits_count&columns[]=registrations_count&group_by[]=day&group_by[]=brand&group_by[]=campaign&group_by[]={{ config['dynamic_tag'] or 'dynamic_tag_clickid' }}"

streams:
  - "#/definitions/activity_report_stream"

check:
  type: CheckStream
  stream_names:
    - "activity_report"

spec:
  type: Spec
  documentation_url: https://docs.airbyte.com/integrations/sources/softswiss
  connection_specification:
    title: Softswiss Spec
    type: object
    required:
      - base_url
      - statistic_token
      - tracker_login_id
      - start_date
      - exchange_rates_date
      - step
    additionalProperties: true
    properties:
      # 'TODO: This schema defines the configuration required for the source. This usually involves metadata such as database and/or authentication information.':
      base_url:
        type: string
        description: Url of operators
        order: 1
      statistic_token:
        type: string
        description: Statistic Token
        airbyte_secret: true
        order: 2
      start_date:
        type: string
        description: Start getting data from that date.
        pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        examples:
          - YYYY-MM-DD
        order: 3
      exchange_rates_date:
        type: string
        description: Start getting data using exchange_rates_date.
        pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        examples:
          - YYYY-MM-DD
        order: 4
      tracker_login_id:
        type: string
        description: bankrolls tracker login
        order: 5
      step:
        type: string
        description: number of days using for each quert
        order: 6
      loopback_days:
        type: number
        description: number of loopback_days base on state, default is 10 days
        order: 7
      dynamic_tag:
        type: string
        description: click id tag name, default is dynamic_tag_clickid
        order: 8
      recovery_dates:
        type: string
        description: list of recovery dates comma separated
        order: 9
      is_recovery:
        type: boolean
        description: check recovery 
        order: 10

