version: "0.29.0"

definitions:

  selector:
    type: RecordSelector
    extractor:
      type: CustomRecordExtractor
      # type: DpathExtractor
      # field_path: ["data"]
      class_name: sourcecustomcomponents.CustomRecordExtractor.CustomRecordExtractor_for_Myaffiliates_xml
      field_path: []
  requester:
    type: CustomRequester
    class_name: sourcecustomcomponents.CustomRequester.CustomRequester_for_myaffiliates
    url_base: "abc.com"
    http_method: "GET"
    authenticator:
      type: CustomAuthenticator
      class_name: sourcecustomcomponents.CustomAuthenticator.CustomAuthenticator_for_Myaffiliates
      token_refresh_endpoint: "{{ config['base_url'] }}/oauth/access_token"
      client_id: "{{ config['client_id'] }}"
      client_secret: "{{ config['client_secret'] }}"
  
  datetime_cursor:
    type: "DatetimeBasedCursor"
    start_datetime:
      datetime: "{{ config['start_date'] }}"
      datetime_format: "%Y-%m-%d"
    end_datetime:
      datetime: "{{ now_utc() }}"
      datetime_format: "%Y-%m-%d %H:%M:%S.%f+00:00"
    step: "P1D"
    datetime_format: "%Y-%m-%d"
    cursor_granularity: "P1D"
    cursor_field: "date"
  retriever:
    type: SimpleRetriever
    record_selector:
      $ref: "#/definitions/selector"
    paginator:
      type: NoPagination
    requester:
      $ref: "#/definitions/requester"
  base_stream:
    type: DeclarativeStream
    retriever:
      $ref: "#/definitions/retriever"
    incremental_sync:
      type: CustomIncrementalSync
      class_name: sourcecustomcomponents.CustomDateTimeBasedCursor.CustomDateTimeBasedCursor
      start_datetime:
        datetime: "{{ config['start_date'] }}"
        datetime_format: "%Y-%m-%d"
      end_datetime:
        datetime: "{{ now_utc() }}"
        datetime_format: "%Y-%m-%d %H:%M:%S.%f+00:00"
      step: "P1D"
      datetime_format: "%Y-%m-%d"
      cursor_granularity: "P1D"
      cursor_field: "date"
      cursor_field_new: "date"
      recovery_dates: "{{ config['recovery_dates'] }}"

  customer_report_stream:
    $ref: "#/definitions/base_stream"
    name: "customer_report_stream"
    $parameters:
      path: "statistics-ext.php?p=&d1={{ stream_slice['start_time'] }}&d2={{ stream_slice['start_time'] }}&pdd=customer&cg=&c=&m=&o=&s=&jd1=&jd2=&cc=1&cm=1&cpd=1&mode=xml&sbm=1&dnl=1"
    transformations:
      - type: AddFields
        fields:
          - path: [ "date" ]
            value: "{{ stream_slice['start_time'] }}"
          # - path: [ "tracker_login_id" ]
          #   value: "{{ config['tracker_login_id'] }}"

streams:
  - "#/definitions/customer_report_stream"

check:
  type: CheckStream
  stream_names:
    - "customer_report_stream"
spec:
  type: Spec
  documentation_url: https://docsurl.com
  connection_specification:
    $schema: http://json-schema.org/draft-07/schema#
    title: Myaffiliates Spec
    type: object
    required:
      - base_url
      - start_date
      - client_id
      - client_secret
      - tracker_login_id
    properties:
      # 'TODO: This schema defines the configuration required for the source. This usually involves metadata such as database and/or authentication information.':
      base_url:
        type: string
        description: https://secure.ibetaffiliates.com
        order: 1
      client_id:
        type: string
        description: API client_id.
        order: 2
      client_secret:
        type: string
        description: client_secret.
        airbyte_secret: true
        order: 3
      start_date:
        type: string
        description: Start getting data from that date.
        pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        examples:
          - "%Y-%m-%d"
        order: 4
      tracker_login_id:
        type: string
        description: P1D
        order: 5
      lookback_days:
        type: string
        description: number of lookback_days, default is 10 days
        order: 6
      recovery_dates:
        type: string
        description: list of recovery dates comma separated
        order: 7
      is_recovery:
        type: boolean
        description: check recovery
        order: 8
