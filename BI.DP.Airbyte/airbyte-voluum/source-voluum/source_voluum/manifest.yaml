version: 0.53.0
type: DeclarativeSource
check:
  type: CheckStream
  stream_names:
    - conversions
    - flow_report
streams:
  - type: DeclarativeStream
    name: conversions
    primary_key:
      - clickId
      - conversionTypeId
      - postbackTimestamp
    schema_loader:
      type: InlineSchemaLoader
      schema:
        $schema: http://json-schema.org/schema#
        properties:
          affiliateNetworkId:
            type: string
          affiliateNetworkName:
            type: string
          allConversionsRevenue:
            type: number
          brand:
            type: string
          browser:
            type: string
          browserVersion:
            type: string
          campaignId:
            type: string
          campaignName:
            type: string
          city:
            type: string
          clickId:
            type: string
          connectionType:
            type: string
          connectionTypeName:
            type: string
          conversionOriginalCurrency:
            type: string
          conversionType:
            type: string
          conversionTypeId:
            type: number
          cost:
            type: number
          costSources:
            type: array
          countryCode:
            type: string
          countryName:
            type: string
          customVariable1:
            type: string
          customVariable10:
            type: string
          customVariable2:
            type: string
          customVariable3:
            type: string
          customVariable4:
            type: string
          customVariable5:
            type: string
          customVariable6:
            type: string
          customVariable7:
            type: string
          customVariable8:
            type: string
          customVariable9:
            type: string
          device:
            type: string
          deviceName:
            type: string
          externalId:
            type: string
          ip:
            type: string
          isp:
            type: string
          landerId:
            type: string
          landerName:
            type: string
          mobileCarrier:
            type: string
          model:
            type: string
          offerId:
            type: string
          offerName:
            type: string
          os:
            type: string
          osVersion:
            type: string
          outgoingPostbackUrl:
            type: string
          pathId:
            type: string
          postbackParam1:
            type: string
          postbackParam2:
            type: string
          postbackParam3:
            type: string
          postbackParam4:
            type: string
          postbackParam5:
            type: string
          postbackTimestamp:
            type: string
          referrer:
            type: string
          region:
            type: string
          revenue:
            type: number
          revenueInOriginalCurrency:
            type: number
          subLanderId:
            type: string
          trafficSourceId:
            type: string
          trafficSourceName:
            type: string
          transactionId:
            type: string
          type:
            type: string
          userAgent:
            type: string
          visitTimestamp:
            type: string
        type: object
    retriever:
      type: SimpleRetriever
      requester:
        type: HttpRequester
        url_base: https://api.voluum.com
        path: >-
          https://panel-api2.voluum.com/report/conversions?currency=USD&sort=postbackTimestamp&direction=DESC&groupBy=conversion&conversionTimeMode=CONVERSION&column=clickId&column=postbackTimestamp&column=visitTimestamp&column=externalId&column=transactionId&column=revenue&column=revenueInOriginalCurrency&column=allConversionsRevenue&column=conversionOriginalCurrency&column=costSources&column=cost&column=conversionType&column=outgoingPostbackUrl&column=campaignId&column=type&column=campaignName&column=landerName&column=landerId&column=offerName&column=offerId&column=countryName&column=countryCode&column=region&column=city&column=pathId&column=userAgent&column=trafficSourceName&column=trafficSourceId&column=affiliateNetworkName&column=affiliateNetworkId&column=deviceName&column=os&column=osVersion&column=brand&column=model&column=browser&column=browserVersion&column=isp&column=mobileCarrier&column=connectionTypeName&column=ip&column=referrer&column=customVariable1&column=customVariable2&column=customVariable3&column=customVariable4&column=customVariable5&column=customVariable6&column=customVariable7&column=customVariable8&column=customVariable9&column=customVariable10&column=postbackParam1&column=postbackParam2&column=postbackParam3&column=postbackParam4&column=postbackParam5&tz=America/Los_Angeles
        http_method: GET
        request_parameters: {}
        request_headers:
          clientID: '{{ config[''client_id''] }}'
        authenticator:
          type: SessionTokenAuthenticator
          login_requester:
            type: HttpRequester
            url_base: https://api.voluum.com/auth/access
            path: session
            authenticator:
              type: NoAuth
            http_method: POST
            request_parameters: {}
            request_headers: {}
            request_body_json:
              accessId: '{{ config[''access_key_id'']}}'
              accessKey: '{{ config[''access_key'']}}'
          session_token_path:
            - token
          expiration_duration: PT3H
          request_authentication:
            type: ApiKey
            inject_into:
              type: RequestOption
              field_name: cwauth-token
              inject_into: header
        error_handler:
          type: CompositeErrorHandler
          error_handlers:
            - type: DefaultErrorHandler
              backoff_strategies:
                - type: ExponentialBackoffStrategy
                  factor: 2
        request_body_json: {}
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - rows
      paginator:
        type: DefaultPaginator
        page_token_option:
          type: RequestOption
          inject_into: request_parameter
          field_name: offset
        page_size_option:
          type: RequestOption
          field_name: limit
          inject_into: request_parameter
        pagination_strategy:
          type: OffsetIncrement
          page_size: 100
      partition_router: []
    incremental_sync:
      # type: DatetimeBasedCursor
      type: CustomIncrementalSync
      class_name: sourcecustomcomponents.CustomDateTimeBasedCursor.CustomDateTimeBasedCursor_for_Voluum
      cursor_field: postbackTimestamp
      loopback_window: P{{ config['loopback_days'] }}D
      cursor_datetime_formats: 
        - '%Y-%m-%d %H:%M:%S %p'
        - '%Y-%m-%d'
      datetime_format: '%Y-%m-%dT%H:00:00.000Z'
      start_datetime:
        type: MinMaxDatetime
        datetime: '{{ config[''start_date''] }}'
        datetime_format: '%Y-%m-%d'
      start_time_option:
        type: RequestOption
        field_name: from
        inject_into: request_parameter
      end_time_option:
        type: RequestOption
        field_name: to
        inject_into: request_parameter
      end_datetime:
        type: MinMaxDatetime
        datetime: '{{ now_utc().strftime(''%Y-%m-%dT%H:%M:%SZ'') }}'
        datetime_format: '%Y-%m-%dT%H:%M:%SZ'
      step: P1D
      cursor_granularity: PT0S
      recovery_dates: "{{ config['conversions_recovery_dates'] }}"
