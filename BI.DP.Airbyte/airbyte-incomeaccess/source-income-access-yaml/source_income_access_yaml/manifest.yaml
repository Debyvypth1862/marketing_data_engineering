version: "0.29.0"

definitions:
  selector:
    type: RecordSelector
    extractor:
      type: CustomRecordExtractor
      class_name: sourcecustomcomponents.CustomRecordExtractor.CustomRecordExtractor_for_IncomeAccess
      responsebody: '$."SOAP-ENV:Envelope"."SOAP-ENV:Body".reportresponse.row[*]'
      responseheaders: '$."SOAP-ENV:Envelope"."SOAP-ENV:Header"[*]'
      isattributes: False
  requester:
    type: CustomRequester
    class_name: sourcecustomcomponents.CustomRequester.CustomRequester_for_income_access
    url_base: "abc.com"
    http_method: "GET"
                      
  retriever:
    type: SimpleRetriever
    record_selector:
      $ref: "#/definitions/selector"
    paginator:
      type: NoPagination
    requester:
      $ref: "#/definitions/requester"
  base_stream:
    type: DeclarativeStream
    incremental_sync:
    #   # $ref: "#/definitions/datetime_cursor"
      type: CustomIncrementalSync
      class_name: sourcecustomcomponents.CustomDateTimeBasedCursor.CustomDateTimeBasedCursor_for_Buffalo_and_IncomeAccess
      request_cursor_field: "date"
      cursor_field: "date"
      start_datetime:
        datetime: "{{ config['start_date'] }}"
        datetime_format: "%Y-%m-%d"
      end_datetime:
        datetime: "{{ now_utc() }}"
        datetime_format: "%Y-%m-%d %H:%M:%S.%f+00:00"
      datetime_format: "%Y-%m-%d"
    retriever:
      $ref: "#/definitions/retriever"
  account_report_stream:
    $ref: "#/definitions/base_stream"
    $parameters:
      name: "account_report_stream"
      path: "/api/affreporting.asp"
    transformations:
      - type: AddFields
        fields:
          - path: [ "tracker_login_id" ]
            value: "{{ config['tracker_login_id'] }}"
          - path: [ "date" ]
            value: "{{ stream_slice['start_time'] }}"


streams:
  - "#/definitions/account_report_stream"

check:
  type: CheckStream
  stream_names:
    - "account_report_stream"

spec:
  type: Spec
  documentation_url: https://docs.airbyte.com/integrations/sources/income-access-yaml
  connection_specification:
    $schema: http://json-schema.org/draft-07/schema#
    title: income access Spec
    type: object
    required:
      - base_url
      - start_date
      - api_key
      - tracker_login_id
    properties:
      # 'TODO: This schema defines the configuration required for the source. This usually involves metadata such as database and/or authentication information.':
      base_url:
        type: string
        description: https://secure.ibetaffiliates.com
        order: 1
      start_date:
        type: string
        description: Start getting data from that date.
        pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        examples:
          - "%Y-%m-%d"
        order: 2
      tracker_login_id:
        type: string
        description: P1D
        order: 3
      api_key:
        type: string
        description: client_secret.
        airbyte_secret: true
        order: 4
      loopback_days:
        type: number
        description: number of lookback_days, default is 0 days
        order: 5        
      recovery_dates:
        type: string
        description: list of recovery dates comma separated
        order: 6 
      is_recovery:
        type: boolean
        description: check recovery 
        order: 7          
