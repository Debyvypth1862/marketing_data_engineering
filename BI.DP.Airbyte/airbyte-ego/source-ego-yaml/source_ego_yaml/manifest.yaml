version: "0.29.0"

definitions:
  selector:
    type: RecordSelector
    extractor:
      type: CustomRecordExtractor
      class_name: sourcecustomcomponents.CustomRecordExtractor.CustomRecordExtractor_for_Ego
  requester:
    type: CustomRequester
    class_name: sourcecustomcomponents.CustomRequester.CustomRequester_for_Ego
    url_base: "abc.com"
    http_method: "POST"
    authenticator:
      type: CustomAuthenticator
      class_name: sourcecustomcomponents.CustomAuthenticator.CustomAuthenticator_for_Ego 
  retriever:
    type: SimpleRetriever
    record_selector:
      $ref: "#/definitions/selector"
    paginator:
      type: NoPagination
    requester:
      $ref: "#/definitions/requester"
  base_stream:
    type: DeclarativeStream
    retriever:
      $ref: "#/definitions/retriever"
    incremental_sync:
      type: CustomIncrementalSync
      class_name: sourcecustomcomponents.CustomDateTimeBasedCursor.CustomDateTimeBasedCursor_for_Ego
      start_datetime:
        datetime: "{{ config['start_date'] }}"
        datetime_format: "%Y-%m-%d"
      end_datetime:
        datetime: "{{ now_utc() }}"
        datetime_format: "%Y-%m-%d %H:%M:%S.%f+00:00"
      step: "P1D"
      datetime_format: "%Y-%m-%d"
      cursor_granularity: "P1D"
      cursor_field: "date"
      lookback_window: "P0D"
    transformations:
      - type: AddFields
        fields:
          - path: [ "tracker_login_id" ]
            value: "{{ config['tracker_login_id'] }}"
          - path: [ "report" ]
            value: "{{ stream_slice['report'] }}"
          - path: [ "date" ]
            value: "{{ stream_slice['start_time'] }}"
  brand_report_stream:
    $ref: "#/definitions/base_stream"
    name: "brand_report_stream"
    $parameters:
      path: "/view_reports.html"

streams:
  - "#/definitions/brand_report_stream"

check:
  type: CheckStream
  stream_names:
    - "brand_report_stream"

spec:
  type: Spec
  documentation_url: https://docs.airbyte.com/integrations/sources/ego-yml
  connection_specification:
    title: Ego Yml Spec
    type: object
    required:
      - base_url
      - start_date
      - tracker_login_id
      - username
      - password
      - reports
    properties:
      # 'TODO: This schema defines the configuration required for the source. This usually involves metadata such as database and/or authentication information.':
      base_url:
        type: string
        description: https://secure.ibetaffiliates.com
        order: 1
      start_date:
        type: string
        description: Start getting data from that date.
        pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        examples:
          - "%Y-%m-%d"
        order: 3
      tracker_login_id:
        type: string
        description: P1D
        order: 2
      username:
        type: string
        description: username.
        order: 4
      password:
        type: string
        description: password.
        airbyte_secret: true
        order: 5
      reports:
        type: string
        description: reports.
        order: 6
      recovery_dates:
        type: string
        description: list of recovery dates comma separated
        order: 7
      loopback_days:
        type: number
        description: number of lookback days
        order: 8
      is_recovery:
        type: boolean
        description: check recovery
        order: 9
