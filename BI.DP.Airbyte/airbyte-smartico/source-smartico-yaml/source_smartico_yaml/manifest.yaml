version: "0.29.0"

definitions:
  selector:
    type: RecordSelector
    extractor:
      type: CustomRecordExtractor
      class_name: sourcecustomcomponents.CustomRecordExtractor.CustomRecordExtractor_for_Smartico
      field_path: ["data"]
  requester:
    type: CustomRequester
    class_name: sourcecustomcomponents.CustomRequester.CustomRequester_for_smartico
    url_base: "abc.com"
    http_method: "GET"
    # request_parameters:
    #   aggregation_period : "DAY"
    #   group_by : "utm_campaign,utm_medium,utm_source,afp"
    #   date_from : "{{ stream_slice['start_time'] }}"
    #   date_to : "{{ stream_slice['end_time'] }}"
    # error_handler:
    #     response_filters:
    #         - http_codes: [ 291 ]
    #           action: RETRY
    #     backoff_strategies:
    #       - type: "ExponentialBackoffStrategy"      

     
  datetime_cursor:
    type: "DatetimeBasedCursor"
    start_datetime:
      datetime: "{{ config['start_date'] }}"
      datetime_format: "%Y-%m-%d"
    end_datetime:
      datetime: "{{ now_utc() }}"
      datetime_format: "%Y-%m-%d %H:%M:%S.%f+00:00"
    step: "P1D"
    #lookback_window: "P10D"
    datetime_format: "%Y-%m-%dT%H:%M:%S.%fZ"
    cursor_granularity: "P1D"
    cursor_field: "date"        
  retriever:
    type: SimpleRetriever
    record_selector:
      $ref: "#/definitions/selector"
    paginator:
      type: NoPagination
    requester:
      $ref: "#/definitions/requester"


  base_stream:
    type: DeclarativeStream
    retriever:
      $ref: "#/definitions/retriever"
    incremental_sync:
      type: CustomIncrementalSync
      class_name: sourcecustomcomponents.CustomDateTimeBasedCursor.CustomDateTimeBasedCursor_for_Smartico
      start_datetime:
        datetime: "{{ config['start_date'] }}"
        datetime_format: "%Y-%m-%d"
      end_datetime:
        datetime: "{{ now_utc() }}"
        datetime_format: "%Y-%m-%d %H:%M:%S.%f+00:00"
      step: "P1D"
      datetime_format: "%Y-%m-%d"
      cursor_granularity: "P1D"
      cursor_field: "date"
      recovery_dates: "{{ config['recovery_dates'] }}"

  utm_code_report_stream:
    $ref: "#/definitions/base_stream"
    name: "utm_code_report_stream"
    $parameters:
      path: "/api/af2_media_report_af?"
    transformations:
      - type: AddFields
        fields:
          - path: [ "date" ]
            value: "{{ stream_slice['start_time'] }}"




streams:
  - "#/definitions/utm_code_report_stream"

check:
  type: CheckStream
  stream_names:
    - "utm_code_report_stream"

spec:
  type: Spec
  documentation_url: https://docs.airbyte.com/integrations/sources/smartico-yaml
  connection_specification:
    $schema: http://json-schema.org/draft-07/schema#
    title: Smartico Platform Spec
    type: object
    required:
      - base_url
      - start_date
      - tracker_login_id
      - token
    properties:
      # 'TODO: This schema defines the configuration required for the source. This usually involves metadata such as database and/or authentication information.':
      base_url:
        type: string
        description: https://boapi.smartico.ai/
        order: 1
      start_date:
        type: string
        description: Start getting data from that date.
        pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        examples:
          - "%Y-%m-%d"
        order: 3
      tracker_login_id:
        type: string
        description: P1D
        order: 2
      token:
        type: string
        description: token.
        airbyte_secret: true
        order: 4
      loopback_days:
        type: number
        description: number of lookback_days, default is 10 days
        order: 9
      recovery_dates:
        type: string
        description: list of recovery dates comma separated
        order: 10
      is_recovery:
        type: boolean
        description: check recovery 
        order: 11
