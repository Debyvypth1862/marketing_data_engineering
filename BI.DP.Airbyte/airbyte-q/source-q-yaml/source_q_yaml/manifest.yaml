version: "0.29.0"

definitions:
  selector:
    type: RecordSelector
    extractor:
      type: CustomRecordExtractor
      class_name: sourcecustomcomponents.CustomRecordExtractor.CustomRecordExtractor_for_Q
      field_path: [ ]
  requester:
    type: CustomRequester
    class_name: sourcecustomcomponents.CustomRequester.CustomRequester_for_q
    url_base: "abc.com"
    http_method: "GET"
    # request_parameters:
    #    start : "{{ stream_slice['start'] }}"
    #    end : "{{ stream_slice['end'] }}"
    #    token : "{{ config['token'] }}"
    #    merchant : "{{ stream_slice['merchant'] }}"

    # error_handler:
    #   response_filters:
    #       - predicate: "{{ response['status'] == 'Too early' }}"
    #         action: RETRY
    #         retry_config:
    #           max_attempts: 5
    #           initial_delay_ms: 1000
    #           backoff_factor: 4
    #   # backoff_strategies:
      #       - type: "ConstantBackoffStrategy"
      #         backoff_time_in_seconds: 140


                                            
  datetime_cursor:
    type: "DatetimeBasedCursor"
    start_datetime:
      datetime: "{{ config['start'] }}"
      datetime_format: "%Y-%m-%d"
    end_datetime:
      datetime: "{{ now_utc() }}"
      datetime_format: "%Y-%m-%d %H:%M:%S.%f+00:00"
    step: "P1D"
    datetime_format: "%Y-%m-%d"
    cursor_granularity: "P1D"
    cursor_field: "end"
    recovery_dates: "{{ config['recovery_dates'] }}"      
          
  retriever:
    type: SimpleRetriever
    record_selector:
      $ref: "#/definitions/selector"
    paginator:
      type: NoPagination
    requester:
      $ref: "#/definitions/requester"
  base_stream:
    type: DeclarativeStream
    retriever:
      $ref: "#/definitions/retriever"
    incremental_sync:
      # $ref: "#/definitions/datetime_cursor"
      type: CustomIncrementalSync
      class_name: sourcecustomcomponents.CustomDateTimeBasedCursor.CustomDateTimeBasedCursor_for_Q
      start_datetime:
        datetime: "{{ config['start'] }}"
        datetime_format: "%Y-%m-%d"
      end_datetime:
        datetime: "{{ now_utc() }}"
        datetime_format: "%Y-%m-%d %H:%M:%S.%f+00:00"
      step: "P1D"
      datetime_format: "%Y-%m-%d"
      cursor_granularity: "P1D"
      cursor_field: "end"
       

  utm_code_report_stream:
    $ref: "#/definitions/base_stream"
    name: "utm_code_report_stream"
    $parameters:
      path: "/affiliate_statistics/reports"
    transformations:
      - type: AddFields
        fields:

          - path: [ "tracker_login_id" ]
            value: "{{ config['tracker_login_id'] }}" 
          - path: [ "start" ]
            value: "{{ stream_slice['start'] }}"
          - path: ["end"]
            value: "{{ stream_slice['end'] }}"
          - path : ["merchant"]
            value: "{{ config['merchant'] }}" 

streams:
  - "#/definitions/utm_code_report_stream"

check:
  type: CheckStream
  stream_names:
    - "utm_code_report_stream"

spec:
  type: Spec
  documentation_url: https://docs.airbyte.com/integrations/sources/q-yaml
  connection_specification:
    $schema: http://json-schema.org/draft-07/schema#
    title: Q Platform Spec
    type: object
    required:
      - base_url
      - start
      - tracker_login_id
      - token
      - merchant
    properties:
      # 'TODO: This schema defines the configuration required for the source. This usually involves metadata such as database and/or authentication information.':
      base_url:
        type: string
        description: https://secure.ibetaffiliates.com
        order: 1
      start:
        type: string
        description: Start getting data from that date.
        pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        examples:
          - "%Y-%m-%d"
        order: 3
      tracker_login_id:
        type: string
        description: P1D
        order: 2
      token:
        type: string
        description: token.
        airbyte_secret: true
        order: 4
      merchant:
        type: string
        description: merchant
        order: 5
      recovery_dates:
        type: string 
        description: list of recovery dates comma separated
        order: 6
      loopback_days:
        type: number
        description: number of lookback_days, default is 10 days
        order: 7
      is_recovery:
        type: boolean
        description: check recovery 
        order: 8

        

