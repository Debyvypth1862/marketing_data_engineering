version: "0.29.0"

definitions:
  selector:
    type: RecordSelector
    extractor:
      type: CustomRecordExtractor
      class_name: sourcecustomcomponents.CustomRecordExtractor.CustomRecordExtractor_for_netrefer
      field_path: [ ]
  requester:
    type: CustomRequester
    class_name: sourcecustomcomponents.CustomRequester.CustomRequester_for_netrefer
    url_base: "abc.com"
      
  datetime_cursor:
    type: "DatetimeBasedCursor"
    start_datetime:
      datetime: "{{ config['start_date'] }}"
      datetime_format: "%Y-%m-%d"
    end_datetime:
      datetime: "{{ now_utc() }}"
      datetime_format: "%Y-%m-%d %H:%M:%S.%f+00:00"
    step: "P1D"
    #lookback_window: "P10D"
    datetime_format: "%Y-%m-%d"
    cursor_granularity: "P1D"
    cursor_field: "date"
  retriever:
    type: SimpleRetriever
    record_selector:
      $ref: "#/definitions/selector"
    paginator:
      type: NoPagination
    requester:
      $ref: "#/definitions/requester"
      
  base_stream:
    type: DeclarativeStream
    retriever:
      $ref: "#/definitions/retriever"
    incremental_sync:
      type: CustomIncrementalSync
      class_name: sourcecustomcomponents.CustomDateTimeBasedCursor.CustomDateTimeBasedCursor_for_Netrefer
      start_datetime:
        datetime: "{{ config['start_date'] }}"
        datetime_format: "%Y-%m-%d"
      end_datetime:
        datetime: "{{ now_utc() }}"
        datetime_format: "%Y-%m-%d %H:%M:%S.%f+00:00"
      step: "P1D"
      datetime_format: "%Y-%m-%d"
      cursor_granularity: "P1D"
      cursor_field: "date"
      recovery_dates: "{{ config['recovery_dates'] }}"

  dynamic_variables_report_stream:
    $ref: "#/definitions/base_stream"
    name: "dynamic_variables_report_stream"
    $parameters:
      path: "/v2/export/reports/affiliate/XML_MS_DynamicVariables_InclSubAff?"
    transformations:
      - type: AddFields
        fields:
          - path: [ "date" ]
            value: "{{ stream_slice['start_time'] }}"



streams:
  - "#/definitions/dynamic_variables_report_stream"

check:
  type: CheckStream
  stream_names:
    - "dynamic_variables_report_stream"

spec:
  type: Spec
  documentation_url: https://docs.airbyte.com/integrations/sources/netrefer-yaml
  connection_specification:
    $schema: http://json-schema.org/draft-07/schema#
    title: Netrefer Spec
    type: object
    required:
      - base_url
      - start_date
      - tracker_login_id
      - api_key
    properties:
      # 'TODO: This schema defines the configuration required for the source. This usually involves metadata such as database and/or authentication information.':
      base_url:
        type: string
        description: netrefer base url
        order: 1
      start_date:
        type: string
        description: Start getting data from that date.
        pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        examples:
          - "%Y-%m-%d"
        order: 3
      tracker_login_id:
        type: string
        description: P1D
        order: 2
      api_key:
        type: string
        description: api_key.
        airbyte_secret: true
        order: 4
      loopback_days:
          type: number
          description: number of loopback_days, default is 10 days
          order: 5
      recovery_dates:
        type: string
        description: list of recovery dates comma separated
        order: 6
      is_recovery:
        type: boolean
        description: check recovery 
        order: 7