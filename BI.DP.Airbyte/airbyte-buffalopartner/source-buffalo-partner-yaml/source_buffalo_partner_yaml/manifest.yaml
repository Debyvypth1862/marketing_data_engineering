version: "0.29.0"

definitions:
  selector:
    type: RecordSelector
    extractor:
      type: CustomRecordExtractor
      class_name: sourcecustomcomponents.CustomRecordExtractor.CustomRecordExtractor_for_Buffalopartner
      jsonpath: '$.feedStatsResult.results.player[*]'
      isattributes: True
      field_path: []
  requester:
    type: CustomRequester
    class_name: sourcecustomcomponents.CustomRequester.CustomRequester_for_buffalo_partner
    url_base: "abc.com"
    authenticator:
      type: CustomAuthenticator
      class_name: sourcecustomcomponents.CustomAuthenticator.CustomAuthenticator_for_Buffalopartner
    # http_method: "GET"
    # request_parameters:
    #   username: "{{ config['username'] }}"
    #   apikey: "{{ config['apikey'] }}"
    #   start: "{{ stream_slice['start_time'] }}"
    #   end: "{{ stream_slice['start_time'] }}"
  datetime_cursor:
    type: "DatetimeBasedCursor"
    start_datetime:
      datetime: "{{ config['start_date'] }}"
      datetime_format: "%Y-%m-%d"
    end_datetime:
      datetime: "{{ now_utc() }}"
      datetime_format: "%Y-%m-%d %H:%M:%S.%f+00:00"
    step: "P1D"
    datetime_format: "%Y-%m-%d"
    cursor_granularity: "P1D"
    cursor_field: "date"
  retriever:
    type: SimpleRetriever
    record_selector:
      $ref: "#/definitions/selector"
    paginator:
      type: NoPagination
    requester:
      $ref: "#/definitions/requester"
  base_stream:
    type: DeclarativeStream
    retriever:
      $ref: "#/definitions/retriever"
    incremental_sync:
      type: CustomIncrementalSync
      class_name: sourcecustomcomponents.CustomDateTimeBasedCursor.CustomDateTimeBasedCursor_for_Buffalo_and_IncomeAccess
      start_datetime:
        datetime: "{{ config['start_date'] }}"
        datetime_format: "%Y-%m-%d"
      end_datetime:
        datetime: "{{ now_utc() }}"
        datetime_format: "%Y-%m-%d %H:%M:%S.%f+00:00"
      step: "P1D"
      datetime_format: "%Y-%m-%d"
      cursor_granularity: "P1D"
      cursor_field: "date"   
      
  rev_share_report_stream:
    $ref: "#/definitions/base_stream"
    name: "rev_share_report_stream"
    $parameters:
      path: "/api/feed/revshare/player"
    transformations:
      - type: AddFields
        fields:
          - path: [ "date" ]
            value: "{{ stream_slice['start_time'] }}"
          # - path: [ "tracker_login_id" ]
          #   value: "{{ config['tracker_login_id'] }}"       

streams:
  - "#/definitions/rev_share_report_stream"

check:
  type: CheckStream
  stream_names:
    - "rev_share_report_stream"

spec:
  type: Spec
  documentation_url: https://docsurl.com
  connection_specification:
    $schema: http://json-schema.org/draft-07/schema#
    title: BuffaloPartner Spec
    type: object
    required:
      - base_url
      - start_date
      - end_date
      - username
      - apikey
      - tracker_login_id

    properties:
      # 'TODO: This schema defines the configuration required for the source. This usually involves metadata such as database and/or authentication information.':
      base_url:
        type: string
        description: https://secure.ibetaffiliates.com
        order: 1
      username:
        type: string
        description: API client_id.
        order: 2
      apikey:
        type: string
        description: client_secret.
        airbyte_secret: true
        order: 3
      start_date:
        type: string
        description: Start getting data from that date.
        pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        examples:
          - "%Y-%m-%d"
        order: 4
      end_date:
        type: string
        description: End getting data from that date.
        pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        examples:
          - "%Y-%m-%d"
        order: 5
      tracker_login_id:
        type: string
        description: P1D
        order: 6
      loopback_days:
        type: number
        description: number of lookback_days, default is 10 days
        order: 7
      recovery_dates:
        type: string
        description: list of recovery dates comma separated
        order: 8  
      is_recovery:
        type: boolean
        description: check recovery 
        order: 9
